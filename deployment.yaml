apiVersion: apps/v1
kind: Deployment
metadata:
  name: addition-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calculator
  template:
    metadata:
      labels:
        app: calculator
    spec:
      containers:
      - name: calculator
        image: deepak0506/devops-integration:latest
        ports:
        - containerPort: 3000